<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Guitar Chord Hub (Mega Zoom Edition)</title>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #121212; color: #fff;">

<div style="max-width: 800px; margin: auto;">
    <h2 style="text-align: center; color: #1db954; margin-bottom: 30px;">🎸 My Guitar Chord Library</h2>

    <!-- Upload Section -->
    <div style="background: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        <h3 style="margin-top: 0; color: #aaa; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Add New Chord Photo</h3>
        <input type="text" id="chordName" placeholder="Chord Name (e.g., C Major, G7, Am)" style="padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; border-radius: 6px; border: 1px solid #333; background: #252525; color: white; font-size: 15px;">
        <input type="text" id="songTags" placeholder="Song Names / Keywords (comma separated)" style="padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; border-radius: 6px; border: 1px solid #333; background: #252525; color: white; font-size: 15px;">
        <input type="file" id="chordImage" accept="image/*" style="padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; border-radius: 6px; border: 1px solid #333; background: #252525; color: white; font-size: 15px;">
        <button id="uploadBtn" onclick="uploadChord()" style="padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; border-radius: 6px; border: none; background-color: #1db954; color: white; font-weight: bold; font-size: 15px; cursor: pointer;">Save to Browser</button>
    </div>

    <!-- Search Section -->
    <div style="background: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        <h3 style="margin-top: 0; color: #aaa; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Search Chords</h3>
        <input type="text" id="searchBar" onkeyup="searchChords()" placeholder="Type Chord name or Song tag to search..." style="padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; border-radius: 6px; border: 1px solid #333; background: #252525; color: white; font-size: 15px;">
    </div>

    <!-- Display Section -->
    <div id="chordGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 20px;">
        <!-- Chords auto-load -->
    </div>
</div>

<!-- 🔥 MEGA FULL-SCREEN ZOOM MODAL -->
<div id="imageModal" style="display: none; position: fixed; z-index: 99999; left: 0; top: 0; width: 100vw; height: 100vh; background-color: #000; overflow: auto; align-items: center; justify-content: center;">
    
    <!-- Top Control Bar (Zoom buttons) -->
    <div style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100000; background: rgba(30,30,30,0.85); padding: 10px 20px; border-radius: 30px; display: flex; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
        <button onclick="zoomIn()" style="width: 45px; height: 45px; border-radius: 50%; border: none; background: #1db954; color: white; font-size: 24px; font-weight: bold; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;">+</button>
        <button onclick="zoomOut()" style="width: 45px; height: 45px; border-radius: 50%; border: none; background: #333; color: white; font-size: 24px; font-weight: bold; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;">-</button>
        <button onclick="closeZoom()" style="width: 45px; height: 45px; border-radius: 50%; border: none; background: #e91429; color: white; font-size: 20px; font-weight: bold; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;">X</button>
    </div>

    <!-- Image Container with Scroll support if image gets larger than screen -->
    <div id="imgWrapper" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 20px; box-sizing: border-box;">
        <img id="zoomedImage" style="width: 95vw; height: 95vh; object-fit: contain; transition: transform 0.2s ease; transform: scale(1);">
    </div>
</div>

<script>
    let chordLibrary = JSON.parse(localStorage.getItem('chordLibrary')) || [];

    window.onload = function() {
        displayChords(chordLibrary);
    };

    function uploadChord() {
        const name = document.getElementById('chordName').value.trim();
        const tags = document.getElementById('songTags').value.trim().toLowerCase();
        const imageInput = document.getElementById('chordImage');

        if (!name || !imageInput.files[0]) {
            alert("Please enter a Chord Name and select an Image!");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const chordData = {
                id: Date.now(),
                name: name,
                tags: tags.split(',').map(tag => tag.trim()).filter(tag => tag !== ""),
                image: e.target.result
            };

            chordLibrary.push(chordData);
            localStorage.setItem('chordLibrary', JSON.stringify(chordLibrary));
            displayChords(chordLibrary);
            clearForm();
            alert("Chord saved successfully! 🎉");
        };
        reader.readAsDataURL(imageInput.files[0]);
    }

    function displayChords(chords) {
        const grid = document.getElementById('chordGrid');
        grid.innerHTML = '';

        if(chords.length === 0) {
            grid.innerHTML = '<p style="text-align: center; color: #888; font-style: italic; grid-column: 1 / -1;">No chords found. Add some above!</p>';
            return;
        }

        chords.forEach(chord => {
            const card = document.createElement('div');
            card.style.background = '#1e1e1e';
            card.style.padding = '12px';
            card.style.borderRadius = '8px';
            card.style.textAlign = 'center';
            card.style.boxShadow = '0 4px 6px rgba(0,0,0,0.2)';
            
            card.innerHTML = `
                <img src="${chord.image}" alt="${chord.name}" onclick="zoomImage(this)" style="width: 100%; height: 180px; object-fit: cover; border-radius: 6px; background: #333; cursor: pointer;">
                <h4 style="margin: 10px 0 5px 0; font-size: 18px;">${chord.name}</h4>
                <p style="font-size: 12px; color: #1db954; margin: 0; font-weight: 500;">${chord.tags.join(', ')}</p>
            `;
            grid.appendChild(card);
        });
    }

    function searchChords() {
        const query = document.getElementById('searchBar').value.toLowerCase().trim();
        if (query === "") {
            displayChords(chordLibrary);
            return;
        }
        const filteredChords = chordLibrary.filter(chord => {
            return chord.name.toLowerCase().includes(query) || chord.tags.some(tag => tag.includes(query));
        });
        displayChords(filteredChords);
    }

    function clearForm() {
        document.getElementById('chordName').value = '';
        document.getElementById('songTags').value = '';
        document.getElementById('chordImage').value = '';
    }

    // --- MEGA ZOOM & FULL SCREEN LOGIC ---
    const modal = document.getElementById("imageModal");
    const zoomedImg = document.getElementById("zoomedImage");
    let currentScale = 1;

    function zoomImage(imgElement) {
        modal.style.display = "flex";
        zoomedImg.src = imgElement.src;
        currentScale = 1; // Reset scale
        zoomedImg.style.transform = `scale(${currentScale})`;

        // Browser එක Full-Screen කිරීම (Request Fullscreen Mode)
        const docEl = document.documentElement;
        if (docEl.requestFullscreen) {
            docEl.requestFullscreen();
        } else if (docEl.mozRequestFullScreen) { docEl.mozRequestFullScreen(); }
         King = docEl.webkitRequestFullscreen; if (King) { King.call(docEl); }
    }

    function zoomIn() {
        currentScale += 0.25; // ඔබන වාරයක් පාසා 25% ක් ලොකු වෙනවා
        zoomedImg.style.transform = `scale(${currentScale})`;
    }

    function zoomOut() {
        if (currentScale > 0.5) {
            currentScale -= 0.25;
            zoomedImg.style.transform = `scale(${currentScale})`;
        }
    }

    function closeZoom() {
        modal.style.display = "none";
        // Fullscreen එකෙන් අයින් වීම
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.mozCancelFullScreen) { document.mozCancelFullScreen(); }
        else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
    }

    // Esc key එක එබුවොත් full screen එකෙන් අයින් වෙන්න
    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            modal.style.display = "none";
        }
    });
</script>
</body>
</html>
